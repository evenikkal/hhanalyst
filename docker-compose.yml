version: "3.9"

services:
  go_collector:
    build: ./go_collector
    ports:
      - "8082:8082"
    # scratch image has no shell — healthcheck via external probe only
    restart: unless-stopped

  python_analyzer:
    build: ./python_analyzer
    ports:
      - "8090:8090"
    depends_on:
      - go_collector
    environment:
      - COLLECTOR_URL=http://go_collector:8082
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
