name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-go:
    name: Test Go collector
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go_collector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go test ./... -v

  test-python:
    name: Test Python analyzer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python_analyzer/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -v

  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [test-go, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./go_collector
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hhanalyst-collector:latest
      - uses: docker/build-push-action@v5
        with:
          context: ./python_analyzer
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hhanalyst-analyzer:latest
